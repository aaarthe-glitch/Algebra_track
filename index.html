<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algebra Tracker — Big Fat Notebook</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Nunito', sans-serif;
    background: #FFF9F0;
    color: #1A1A2E;
    min-height: 100vh;
    padding: 24px 16px 60px;
    background-image: repeating-linear-gradient(transparent, transparent 31px, #e8e0d5 31px, #e8e0d5 32px);
  }

  .wrapper { max-width: 820px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 28px; }

  .badge {
    display: inline-block;
    background: #1A1A2E;
    color: #FFD600;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 16px;
    border-radius: 20px;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  h1 span { color: #FF3D7F; }

  .subtitle { color: #888; font-weight: 700; font-size: 14px; }

  .progress-wrap {
    background: white;
    border: 2.5px solid #1A1A2E;
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    box-shadow: 4px 4px 0 #1A1A2E;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-label { font-weight: 900; font-size: 18px; white-space: nowrap; }

  .progress-bar-track {
    flex: 1;
    height: 18px;
    background: #f0ebe3;
    border-radius: 20px;
    border: 2px solid #1A1A2E;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #FF3D7F, #FFD600);
    border-radius: 20px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-pct {
    font-weight: 900;
    font-size: 22px;
    color: #FF3D7F;
    min-width: 50px;
    text-align: right;
  }

  .unit-section { margin-bottom: 22px; }

  .unit-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .unit-pill {
    font-weight: 800;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    border: 2.5px solid #1A1A2E;
    color: white;
    white-space: nowrap;
  }

  .unit-title { font-weight: 800; font-size: 15px; }

  .week-card {
    background: white;
    border: 2.5px solid #1A1A2E;
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 38px 1fr auto;
    align-items: start;
    gap: 12px;
    box-shadow: 3px 3px 0 #1A1A2E;
    transition: all 0.2s;
  }

  .week-card.done {
    background: #F0FFF4;
    border-color: #00C853;
    box-shadow: 3px 3px 0 #00C853;
  }

  .week-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2.5px solid #1A1A2E;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
    color: white;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .week-card.done .week-num { background: #00C853 !important; }

  .week-label { font-weight: 800; font-size: 14px; margin-bottom: 3px; }
  .week-detail { font-size: 12px; color: #666; font-weight: 600; line-height: 1.5; }

  .ixl-tag {
    display: inline-block;
    margin-top: 5px;
    font-size: 11px;
    font-weight: 700;
    background: #2979FF;
    color: white;
    padding: 2px 10px;
    border-radius: 20px;
  }

  .checkbox-col { display: flex; flex-direction: column; gap: 8px; padding-top: 2px; }

  .check-row { display: flex; align-items: center; gap: 6px; cursor: pointer; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2.5px solid #1A1A2E;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
  }

  .checkbox.checked { background: #00C853; border-color: #00C853; }

  .check-label {
    font-size: 10px;
    font-weight: 800;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .reward-box {
    background: #1A1A2E;
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    color: white;
    margin-top: 8px;
  }

  .reward-box h2 { font-weight: 900; font-size: 22px; margin-bottom: 8px; }

  .star-display { font-size: 36px; letter-spacing: 6px; margin: 12px 0; }

  .reward-msg { font-size: 14px; opacity: 0.8; font-weight: 600; }
  .reward-count { font-size: 12px; opacity: 0.5; margin-top: 8px; }

  @media print {
    body { background: white; padding: 0; }
    .week-card { box-shadow: none; break-inside: avoid; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="badge">📓 22-Week Complete Study Plan</div>
    <h1>Pre-Algebra & <span>Algebra 1</span><br>Progress Tracker</h1>
    <p class="subtitle">Big Fat Notebook · IXL Algebra · Grade 6 Mission 🛸</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">🚀 Progress</div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <div id="schedule"></div>

  <div class="reward-box">
    <h2>🌟 Mission Reward</h2>
    <div class="star-display" id="starDisplay">☆☆☆☆☆</div>
    <p class="reward-msg" id="rewardMsg">Tick Book ✓ and IXL ✓ each week to earn stars!</p>
    <p class="reward-count" id="rewardCount">0 / 44 checks completed</p>
  </div>

</div>

<script>
const UNITS = [
  { num:1, label:"Unit 1", title:"Arithmetic Properties", emoji:"🔢", color:"#FF6B6B", dark:false,
    weeks:[{w:1,label:"Types of Numbers, Algebraic Properties, PEMDAS",detail:"Ch 1–3 · Pages 1–22",ixl:"Order of Operations, Number Properties"}]},
  { num:2, label:"Unit 2", title:"The Number System", emoji:"➕", color:"#FF9F43", dark:false,
    weeks:[
      {w:2,label:"Positive & Negative Whole Numbers",detail:"Ch 4–6 · Pages 23–42",ixl:"Integers & Absolute Value"},
      {w:3,label:"Fractions, Decimals & Mixed Numbers",detail:"Ch 7–10 · Pages 43–72",ixl:"Fractions & Decimals"}
    ]},
  { num:3, label:"Unit 3", title:"Ratios, Proportions & Percent", emoji:"📊", color:"#F9CA24", dark:true,
    weeks:[
      {w:4,label:"Ratio, Proportion & Unit Rate",detail:"Ch 11–13 · Pages 75–92",ixl:"Ratios & Proportional Relationships"},
      {w:5,label:"Percent, Simple Interest & % Change",detail:"Ch 14–16 · Pages 93–131",ixl:"Percents & Applications"},
      {w:6,label:"Tables & Ratios",detail:"Ch 17–18 · Pages 131–140",ixl:"Ratio Tables & Graphs"}
    ]},
  { num:4, label:"Unit 4", title:"Exponents & Algebraic Expressions", emoji:"⚡", color:"#6AB04C", dark:false,
    weeks:[
      {w:7,label:"Exponents & Scientific Notation",detail:"Ch 19–21 · Pages 141–160",ixl:"Exponents & Scientific Notation"},
      {w:8,label:"Expressions, Evaluating & Like Terms",detail:"Ch 22–23 · Pages 161–170",ixl:"Simplifying & Evaluating Expressions"}
    ]},
  { num:5, label:"Unit 5", title:"Linear Equations & Inequalities", emoji:"⚖️", color:"#22A6B3", dark:false,
    weeks:[
      {w:9,label:"Intro to Equations & One-Variable",detail:"Ch 24–26 · Pages 175–194",ixl:"One & Two-Step Equations"},
      {w:10,label:"Compound Inequalities & Rewriting",detail:"Ch 27–29 · Pages 195–228",ixl:"Inequalities"},
      {w:11,label:"Systems — Substitution & Elimination",detail:"Ch 29–30 · Pages 225–242",ixl:"Systems of Equations"}
    ]},
  { num:6, label:"Unit 6", title:"Graphing Linear Equations", emoji:"📈", color:"#4834D4", dark:false,
    weeks:[
      {w:12,label:"Points, Lines & Slope",detail:"Ch 31–33 · Pages 247–270",ixl:"Slope & Graphing Lines"},
      {w:13,label:"Slope-Intercept & Point-Slope Form",detail:"Ch 34–35 · Pages 271–292",ixl:"Linear Equations — All Forms"},
      {w:14,label:"Graphing Systems & Inequalities",detail:"Ch 36–38 · Pages 293–316",ixl:"Graphing Inequalities"}
    ]},
  { num:7, label:"Unit 7", title:"Statistics & Probability", emoji:"🎲", color:"#BE2EDD", dark:false,
    weeks:[
      {w:15,label:"Stats, Data Display & Central Tendency",detail:"Ch 39–42 · Pages 325–370",ixl:"Statistics & Data"},
      {w:16,label:"Probability, Compound Events & Combinations",detail:"Ch 43–44 · Pages 371–396",ixl:"Probability"}
    ]},
  { num:8, label:"Unit 8", title:"Functions", emoji:"🔁", color:"#FF3D7F", dark:false,
    weeks:[{w:17,label:"Relations, Functions & Notation",detail:"Ch 45–47 · Pages 395–416",ixl:"Functions & Function Notation"}]},
  { num:9, label:"Unit 9", title:"Polynomial Operations", emoji:"🧮", color:"#0652DD", dark:false,
    weeks:[{w:18,label:"Add/Subtract & Multiply/Divide Polynomials",detail:"Ch 48–51 · Pages 427–460",ixl:"Polynomials"}]},
  { num:10, label:"Unit 10", title:"Factoring Polynomials", emoji:"🔍", color:"#009432", dark:false,
    weeks:[{w:19,label:"GCF, Grouping, Trinomials & Special Formulas",detail:"Ch 52–56 · Pages 461–500",ixl:"Factoring"}]},
  { num:11, label:"Unit 11", title:"Radicals", emoji:"√", color:"#C4E538", dark:true,
    weeks:[{w:20,label:"Square Roots, Simplifying & Radical Operations",detail:"Ch 57–60 · Pages 505–532",ixl:"Radicals & Square Roots"}]},
  { num:12, label:"Unit 12", title:"Quadratic Equations", emoji:"📐", color:"#EA2027", dark:false,
    weeks:[{w:21,label:"Factoring, Square Roots & Completing the Square",detail:"Ch 61–65 · Pages 533–572",ixl:"Solving Quadratics"}]},
  { num:13, label:"Unit 13", title:"Quadratic Functions", emoji:"🚀", color:"#833471", dark:false,
    weeks:[{w:22,label:"Graphing Quadratics & Discriminant",detail:"Ch 66–68 · Pages 573–618",ixl:"Quadratic Functions & Parabolas"}]}
];

const TOTAL = 44;
const state = {};
UNITS.forEach(u => u.weeks.forEach(w => { state[w.w] = { book:false, ixl:false }; }));

try {
  const saved = localStorage.getItem('algebraStateV2');
  if (saved) {
    const parsed = JSON.parse(saved);
    for (const k in parsed) if (state[k]) state[k] = parsed[k];
  }
} catch(e) {}

function updateProgress() {
  const done = Object.values(state).reduce((a,v)=>a+(v.book?1:0)+(v.ixl?1:0),0);
  const pct = Math.round((done/TOTAL)*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  const stars = Math.floor(pct/20);
  document.getElementById('starDisplay').textContent = '★'.repeat(stars) + '☆'.repeat(5-stars);
  const msgs = [
    "Tick Book ✓ and IXL ✓ each week to earn stars!",
    "Great start! Keep the momentum 🚀",
    "Almost halfway — incredible work! 💪",
    "Past the halfway mark! You're unstoppable 🎯",
    "So close to the finish line! 🔥",
    "🎉 MISSION COMPLETE! Algebra 1 — CONQUERED!"
  ];
  document.getElementById('rewardMsg').textContent = msgs[stars];
  document.getElementById('rewardCount').textContent = done + ' / ' + TOTAL + ' checks completed';
  localStorage.setItem('algebraStateV2', JSON.stringify(state));
}

function buildSchedule() {
  const container = document.getElementById('schedule');
  container.innerHTML = '';

  UNITS.forEach(unit => {
    const section = document.createElement('div');
    section.className = 'unit-section';

    const header = document.createElement('div');
    header.className = 'unit-header';
    header.innerHTML = `
      <div class="unit-pill" style="background:${unit.color}; color:${unit.dark ? '#333' : 'white'};">${unit.emoji} ${unit.label}</div>
      <div class="unit-title">${unit.title}</div>
    `;
    section.appendChild(header);

    unit.weeks.forEach(wk => {
      const card = document.createElement('div');
      const isDone = state[wk.w].book && state[wk.w].ixl;
      card.className = 'week-card' + (isDone ? ' done' : '');
      card.innerHTML = `
        <div class="week-num" style="background:${isDone ? '#00C853' : unit.color}; color:${(!isDone && unit.dark) ? '#333' : 'white'};">${wk.w}</div>
        <div>
          <div class="week-label">${wk.label}</div>
          <div class="week-detail">${wk.detail}</div>
          <div class="ixl-tag">📊 IXL: ${wk.ixl}</div>
        </div>
        <div class="checkbox-col">
          <div class="check-row" data-week="${wk.w}" data-type="book">
            <div class="checkbox ${state[wk.w].book?'checked':''}">${state[wk.w].book?'✓':''}</div>
            <span class="check-label">Book</span>
          </div>
          <div class="check-row" data-week="${wk.w}" data-type="ixl">
            <div class="checkbox ${state[wk.w].ixl?'checked':''}">${state[wk.w].ixl?'✓':''}</div>
            <span class="check-label">IXL</span>
          </div>
        </div>
      `;

      card.querySelectorAll('.check-row').forEach(row => {
        row.addEventListener('click', () => {
          const w = row.dataset.week, type = row.dataset.type;
          state[w][type] = !state[w][type];
          buildSchedule();
          updateProgress();
        });
      });

      section.appendChild(card);
    });

    container.appendChild(section);
  });
}

buildSchedule();
updateProgress();
</script>
</body>
</html>
